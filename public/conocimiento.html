<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conocimiento | Gestion de Conocimiento ONG</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-search-scope="knowledge">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="dashboard.html"><span class="brand-mark">GC</span><div><strong>ONG KMS</strong><span>Jerarquia viva</span></div></a>
      <nav><ul class="nav-list">
        <li><a class="nav-link" data-page="dashboard" href="dashboard.html"><span class="nav-icon">IN</span>Inicio</a></li>
        <li><a class="nav-link" data-page="conocimiento" href="conocimiento.html"><span class="nav-icon">KC</span>Conocimiento</a></li>
        <li><a class="nav-link" data-page="leyes" href="leyes.html"><span class="nav-icon">LY</span>Leyes ONG</a></li>
        <li><a class="nav-link" data-page="documentos" href="documentos.html"><span class="nav-icon">DO</span>Documentos</a></li>
        <li><a class="nav-link" data-page="oportunidades" href="oportunidades.html"><span class="nav-icon">OP</span>Oportunidades</a></li>
        <li><a class="nav-link" data-page="analytics" href="analytics.html"><span class="nav-icon">AN</span>Analitica</a></li>
      </ul></nav>
      <section class="user-card"><strong data-user-name></strong><span data-user-role></span><button class="ghost" type="button" onclick="logout()">Cerrar sesion</button></section>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="search-box"><input data-search-input type="search" placeholder="Buscar conocimiento por titulo, contenido, etiquetas o autor"><div class="suggestions" data-suggestions></div></div>
        <div class="topbar-actions"><button type="button" data-role-only="administrador,creador_ong" onclick="window.KMS.openTaxonomyManager()">Gestionar taxonomia</button><button type="button" data-role-only="administrador,creador_ong" onclick="window.KMS.openArticleForm()">Crear articulo</button></div>
      </header>
      <section class="content">
        <div class="page-header">
          <div><h1>Base jerarquica de conocimiento</h1><p>Categorias, subcategorias y articulos con visibilidad por rol y organizacion relacionada.</p></div>
        </div>
        <section class="panel">
          <div class="filters">
            <select data-filter-category aria-label="Filtrar por categoria">
              <option value="">Todas las categorias</option>
              <option>Voluntariado</option><option>Donaciones</option><option>Beneficiarios</option><option>Proyectos sociales</option>
              <option>Capacitaciones</option><option>Documentos internos</option><option>Guias para voluntarios</option><option>Reportes de impacto</option>
            </select>
            <input data-filter-author placeholder="Autor" aria-label="Filtrar por autor">
            <select data-filter-type aria-label="Filtrar por tipo">
              <option value="">Todo tipo</option><option value="articulo">Articulo</option><option value="guia">Guia</option><option value="reporte">Reporte</option><option value="plantilla">Plantilla</option><option value="politica">Politica</option>
            </select>
            <select data-filter-role aria-label="Filtrar por rol permitido">
              <option value="">Cualquier rol</option><option value="administrador">Administrador</option><option value="creador_ong">Creador ONG</option><option value="voluntario">Voluntario</option>
            </select>
          </div>
        </section>
        <section class="split">
          <aside class="panel knowledge-tree"><h2>Taxonomia</h2><div id="knowledgeTree"></div></aside>
          <div class="grid cols-2" id="knowledgeItems" data-search-results></div>
        </section>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/laws-data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>
  <script>document.addEventListener('DOMContentLoaded', window.KMS.renderKnowledge);</script>
</body>
</html>
