<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administrar roles | Gestion de Conocimiento ONG</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="dashboard.html"><span class="brand-mark">GC</span><div><strong>ONG KMS</strong><span>Administracion</span></div></a>
      <nav><ul class="nav-list">
        <li><a class="nav-link" data-page="dashboard" href="dashboard.html"><span class="nav-icon">IN</span>Inicio</a></li>
        <li><a class="nav-link" data-page="conocimiento" href="conocimiento.html"><span class="nav-icon">KC</span>Conocimiento</a></li>
        <li><a class="nav-link" data-page="leyes" href="leyes.html"><span class="nav-icon">LY</span>Leyes ONG</a></li>
        <li><a class="nav-link" data-page="documentos" href="documentos.html"><span class="nav-icon">DO</span>Documentos</a></li>
        <li><a class="nav-link" data-page="oportunidades" href="oportunidades.html"><span class="nav-icon">OP</span>Oportunidades</a></li>
        <li><a class="nav-link" data-page="analytics" href="analytics.html"><span class="nav-icon">AN</span>Analitica</a></li>
        <li><a class="nav-link" data-page="admin" href="admin.html"><span class="nav-icon">AD</span>Roles</a></li>
      </ul></nav>
      <section class="user-card"><strong data-user-name></strong><span data-user-role></span><button class="ghost" type="button" onclick="logout()">Cerrar sesion</button></section>
    </aside>
    <main class="main">
      <header class="topbar"><div class="search-box"><input type="search" placeholder="Buscar usuarios"><div class="suggestions"></div></div></header>
      <section class="content">
        <div class="page-header"><div><h1>Administrar roles</h1><p>Solo el administrador puede cambiar roles y revisar usuarios del sistema.</p></div></div>
        <section class="panel table-wrap">
          <table>
            <thead><tr><th>Usuario</th><th>Correo</th><th>ONG</th><th>Estado</th><th>Rol</th><th>Accion</th></tr></thead>
            <tbody id="adminUsersTable"></tbody>
          </table>
        </section>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      window.KMS.layoutInit('admin');
      const tbody = document.getElementById('adminUsersTable');
      try {
        const [users, roles] = await Promise.all([window.KMS.api('/api/admin/users'), window.KMS.api('/api/admin/roles')]);
        tbody.innerHTML = users.map(user => `<tr><td><strong>${window.KMS.escapeHtml(user.full_name)}</strong></td><td>${window.KMS.escapeHtml(user.email)}</td><td>${window.KMS.escapeHtml(user.organizations?.name || '')}</td><td>${window.KMS.escapeHtml(user.status)}</td><td><select data-user-role-select="${user.id}">${roles.map(role => `<option value="${role.id}" ${user.roles?.name === role.name ? 'selected' : ''}>${window.KMS.escapeHtml(role.name)}</option>`).join('')}</select></td><td><button onclick="saveRole('${user.id}')">Guardar</button></td></tr>`).join('');
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="6">${window.KMS.escapeHtml(error.message)}</td></tr>`;
      }
    });
    async function saveRole(id) {
      const role_id = document.querySelector(`[data-user-role-select="${id}"]`).value;
      try { await window.KMS.api(`/api/admin/users/${id}/role`, { method: 'PATCH', body: JSON.stringify({ role_id }) }); window.KMS.toast('Rol actualizado.'); }
      catch (error) { window.KMS.toast(error.message, 'error'); }
    }
  </script>
</body>
</html>
